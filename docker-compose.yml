version: "3.9"

services:
  redis:
    image: redis:7
    container_name: url_shortener_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: url_shortener_postgres
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
